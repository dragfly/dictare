name: "claude: issue dedupe"

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to check for duplicates
        required: true

jobs:
  dedupe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v6

      - name: Load secrets from Infisical
        env:
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
        run: |
          curl -1sLf 'https://dl.cloudsmith.io/public/infisical/infisical-cli/setup.deb.sh' | sudo -E bash
          sudo apt-get install -y infisical
          infisical export \
            --domain "https://eu.infisical.com" \
            --projectId "7d6c2573-e67b-4243-9911-0a9ddaed58b8" \
            --path "/work/dictare/app/ci" \
            --env prod \
            --format json | \
            jq -c '.[]' | while read -r item; do
              key=$(echo "$item" | jq -r '.key')
              value=$(echo "$item" | jq -r '.value')
              while IFS= read -r line; do
                [[ -n "$line" ]] && echo "::add-mask::$line"
              done <<< "$value"
              EOF_MARKER="EOF_$(head -c 8 /dev/urandom | xxd -p)"
              echo "$key<<$EOF_MARKER" >> "$GITHUB_ENV"
              echo "$value" >> "$GITHUB_ENV"
              echo "$EOF_MARKER" >> "$GITHUB_ENV"
            done

      - name: Run Claude Code for Deduplication
        timeout-minutes: 8
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          anthropic_api_key: ${{ env.ANTHROPIC_API_KEY }}
          claude_args: "--model claude-sonnet-4-6"
          prompt: |
            Check if this issue is a duplicate for the dictare project.

            REPO: ${{ github.repository }}
            ISSUE_NUMBER: ${{ github.event.issue.number || github.event.inputs.issue_number }}

            Instructions:
            1. Read the new issue
            2. Search existing issues for similar ones (use gh issue list --state all --limit 200)
            3. If a duplicate is found:
               - Comment on the new issue linking to the original: "Duplicate of #NNN"
               - Add the label "duplicate"
               - Do NOT close it (the maintainer will decide)
            4. If no duplicate, do nothing (no comment needed)
