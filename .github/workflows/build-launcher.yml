name: "0 - release: sign launcher"

on:
  workflow_dispatch:

jobs:
  build-sign-notarize:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # Fetch secrets from Infisical (single token, all secrets centralized)
      - name: Load secrets from Infisical
        env:
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
        run: |
          brew install infisical/get-cli/infisical
          # Export secrets as JSON → write to GITHUB_ENV + mask values
          # Note: cannot use IFS='=' because base64 values contain '=' padding
          infisical export \
            --domain "https://eu.infisical.com" \
            --projectId "7d6c2573-e67b-4243-9911-0a9ddaed58b8" \
            --path "/work/dictare/app/ci" \
            --env prod \
            --format json | \
            jq -c '.[]' | while read -r item; do
              key=$(echo "$item" | jq -r '.key')
              value=$(echo "$item" | jq -r '.value')
              # Mask each line separately (multiline values like PEM keys)
              while IFS= read -r line; do
                [[ -n "$line" ]] && echo "::add-mask::$line"
              done <<< "$value"
              # Use heredoc for multiline values (e.g. PEM keys)
              EOF_MARKER="EOF_$(head -c 8 /dev/urandom | xxd -p)"
              echo "$key<<$EOF_MARKER" >> "$GITHUB_ENV"
              echo "$value" >> "$GITHUB_ENV"
              echo "$EOF_MARKER" >> "$GITHUB_ENV"
            done

      # Verify secrets were loaded
      - name: Verify secrets
        run: |
          missing=()
          for var in APPLE_DEVELOPER_ID_P12 APPLE_DEVELOPER_ID_P12_PASSWORD \
                     APPLE_NOTARIZATION_DICTARE_KEY APPLE_NOTARIZATION_DICTARE_KEY_ID \
                     APPLE_NOTARIZATION_ISSUER_ID; do
            if [[ -z "${!var:-}" ]]; then
              missing+=("$var")
            else
              val="${!var}"
              echo "✓ $var is set (${#val} chars)"
            fi
          done
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::error::Missing secrets: ${missing[*]}"
            exit 1
          fi

      # Import Developer ID certificate into a temporary keychain
      - name: Import signing certificate
        run: |
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          security create-keychain -p "" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          echo "$APPLE_DEVELOPER_ID_P12" | base64 -d > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$APPLE_DEVELOPER_ID_P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain

      # Build universal binary + sign with Hardened Runtime
      - name: Build and sign launcher
        run: |
          DICTARE_SIGN_IDENTITY="Developer ID Application" \
            ./scripts/macos/sign-launcher.sh

      # Assemble the complete .app bundle (binary + Info.plist + icon)
      # python_path is NOT inside the bundle — the launcher reads it from
      # ~/.dictare/python_path at runtime, so the signed bundle stays immutable.
      - name: Assemble .app bundle
        run: |
          VERSION=$(grep -E '^__version__' src/dictare/__init__.py | sed 's/.*"\(.*\)"/\1/')
          BUNDLE="build/bundle/Dictare.app"
          CONTENTS="$BUNDLE/Contents"
          MACOS_DIR="$CONTENTS/MacOS"
          RESOURCES_DIR="$CONTENTS/Resources"

          mkdir -p "$MACOS_DIR" "$RESOURCES_DIR"

          # Binary
          cp build/launcher/Dictare "$MACOS_DIR/Dictare"

          # Info.plist
          /usr/libexec/PlistBuddy -c "Clear dict" "$CONTENTS/Info.plist" 2>/dev/null || true
          cat > "$CONTENTS/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>Dictare</string>
            <key>CFBundleDisplayName</key>
            <string>Dictare</string>
            <key>CFBundleIdentifier</key>
            <string>dev.dragfly.dictare</string>
            <key>CFBundleVersion</key>
            <string>VERSION_PLACEHOLDER</string>
            <key>CFBundleShortVersionString</key>
            <string>VERSION_PLACEHOLDER</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleExecutable</key>
            <string>Dictare</string>
            <key>CFBundleIconFile</key>
            <string>Dictare</string>
            <key>LSUIElement</key>
            <true/>
            <key>NSMicrophoneUsageDescription</key>
            <string>Dictare needs microphone access for voice-to-text.</string>
            <key>NSInputMonitoringUsageDescription</key>
            <string>Dictare uses Input Monitoring to detect the global Right ⌘ hotkey.</string>
          </dict>
          </plist>
          PLIST
          # Inject actual version
          sed -i '' "s/VERSION_PLACEHOLDER/$VERSION/g" "$CONTENTS/Info.plist"

          # Icon
          cp src/dictare/resources/Dictare.icns "$RESOURCES_DIR/Dictare.icns"

          # Launcher metadata — stored in Resources/ (not MacOS/) because
          # codesign requires all files in MacOS/ to be signed Mach-O binaries.
          HASH=$(shasum -a 256 src/dictare/resources/launcher.swift | cut -c1-16)
          echo "$HASH" > "$RESOURCES_DIR/launcher_hash"
          echo "true" > "$RESOURCES_DIR/launcher_signed"

          echo "==> Bundle assembled: $BUNDLE (version $VERSION)"
          ls -laR "$BUNDLE"

      # Sign the complete .app bundle (not just the binary)
      - name: Sign bundle
        run: |
          codesign --force --options runtime \
            --entitlements src/dictare/resources/Dictare.entitlements \
            --sign "Developer ID Application" \
            build/bundle/Dictare.app
          codesign --verify --strict build/bundle/Dictare.app
          echo "==> Bundle signed and verified"

      # Notarize the complete bundle
      - name: Notarize
        run: |
          echo "$APPLE_NOTARIZATION_DICTARE_KEY" > "$RUNNER_TEMP/AuthKey.p8"
          ditto -c -k build/bundle/Dictare.app build/bundle/Dictare.app.zip
          xcrun notarytool submit build/bundle/Dictare.app.zip \
            --key "$RUNNER_TEMP/AuthKey.p8" \
            --key-id "$APPLE_NOTARIZATION_DICTARE_KEY_ID" \
            --issuer "$APPLE_NOTARIZATION_ISSUER_ID" \
            --wait --timeout 10m

      # Staple the notarization ticket to the bundle
      - name: Staple
        run: |
          xcrun stapler staple build/bundle/Dictare.app
          echo "==> Notarization ticket stapled"

      # Upload to the fixed "launcher" release tag (version-independent)
      - name: Upload to launcher release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ZIP="Dictare-launcher-universal.zip"
          ditto -c -k build/bundle/Dictare.app "$ZIP"
          # Create or update the fixed "launcher" release.
          # First try to upload to existing release; if it doesn't exist, create it.
          if gh release view "launcher" &>/dev/null; then
            gh release upload "launcher" "$ZIP" --clobber
          else
            gh release create "launcher" "$ZIP" \
              --title "Signed Launcher (Developer ID)" \
              --notes "Pre-built signed + notarized Dictare.app bundle. Downloaded automatically by install.sh."
          fi
          echo "==> Uploaded $ZIP to 'launcher' release"

      # Upload as artifact (always, for manual builds)
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dictare-launcher-universal
          path: build/bundle/Dictare.app
