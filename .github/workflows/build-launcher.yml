name: "0 - release: sign launcher"

on:
  workflow_dispatch:

jobs:
  build-sign-notarize:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # Fetch secrets from Infisical (single token, all secrets centralized)
      - name: Load secrets from Infisical
        env:
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
        run: |
          brew install infisical/get-cli/infisical
          # Export secrets as JSON → write to GITHUB_ENV + mask values
          # Note: cannot use IFS='=' because base64 values contain '=' padding
          infisical export \
            --domain "https://eu.infisical.com" \
            --projectId "7d6c2573-e67b-4243-9911-0a9ddaed58b8" \
            --path "/work/dictare/app/ci" \
            --env prod \
            --format json | \
            jq -c '.[]' | while read -r item; do
              key=$(echo "$item" | jq -r '.key')
              value=$(echo "$item" | jq -r '.value')
              # Mask each line separately (multiline values like PEM keys)
              while IFS= read -r line; do
                [[ -n "$line" ]] && echo "::add-mask::$line"
              done <<< "$value"
              # Use heredoc for multiline values (e.g. PEM keys)
              EOF_MARKER="EOF_$(head -c 8 /dev/urandom | xxd -p)"
              echo "$key<<$EOF_MARKER" >> "$GITHUB_ENV"
              echo "$value" >> "$GITHUB_ENV"
              echo "$EOF_MARKER" >> "$GITHUB_ENV"
            done

      # Verify secrets were loaded
      - name: Verify secrets
        run: |
          missing=()
          for var in APPLE_DEVELOPER_ID_P12 APPLE_DEVELOPER_ID_P12_PASSWORD \
                     APPLE_NOTARIZATION_DICTARE_KEY APPLE_NOTARIZATION_DICTARE_KEY_ID \
                     APPLE_NOTARIZATION_ISSUER_ID; do
            if [[ -z "${!var:-}" ]]; then
              missing+=("$var")
            else
              val="${!var}"
              echo "✓ $var is set (${#val} chars)"
            fi
          done
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::error::Missing secrets: ${missing[*]}"
            exit 1
          fi

      # Import Developer ID certificate into a temporary keychain
      - name: Import signing certificate
        run: |
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          security create-keychain -p "" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          echo "$APPLE_DEVELOPER_ID_P12" | base64 -d > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$APPLE_DEVELOPER_ID_P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain

      # Build universal binary + sign with Hardened Runtime
      - name: Build and sign launcher
        run: |
          DICTARE_SIGN_IDENTITY="Developer ID Application" \
            ./scripts/macos/sign-launcher.sh

      # Notarize with App Store Connect API key
      - name: Notarize
        run: |
          echo "$APPLE_NOTARIZATION_DICTARE_KEY" > "$RUNNER_TEMP/AuthKey.p8"
          ditto -c -k build/launcher/Dictare build/launcher/Dictare.zip
          xcrun notarytool submit build/launcher/Dictare.zip \
            --key "$RUNNER_TEMP/AuthKey.p8" \
            --key-id "$APPLE_NOTARIZATION_DICTARE_KEY_ID" \
            --issuer "$APPLE_NOTARIZATION_ISSUER_ID" \
            --wait --timeout 10m

      # Create draft release + upload signed launcher (only on tag push)
      - name: Create draft release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ZIP="Dictare-launcher-${VERSION}-universal.zip"
          ditto -c -k build/launcher/Dictare "$ZIP"
          # Create draft release (or upload to existing)
          gh release create "$GITHUB_REF_NAME" "$ZIP" \
            --draft \
            --title "v${VERSION}" \
            --generate-notes \
            2>/dev/null \
          || gh release upload "$GITHUB_REF_NAME" "$ZIP" --clobber

      # Upload as artifact (always, for manual builds)
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dictare-launcher-universal
          path: build/launcher/Dictare
