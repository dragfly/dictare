name: Build & Notarize Launcher

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-sign-notarize:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # Import Developer ID certificate into a temporary keychain
      - name: Import signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.APPLE_DEVELOPER_ID_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          security create-keychain -p "" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          echo "$CERTIFICATE_P12" | base64 -d > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain

      # Build universal binary + sign with Hardened Runtime
      - name: Build and sign launcher
        run: |
          DICTARE_SIGN_IDENTITY="Developer ID Application" \
            ./scripts/sign-launcher.sh

      # Notarize with App Store Connect API key
      - name: Notarize
        env:
          NOTARY_KEY: ${{ secrets.APPLE_NOTARIZATION_DICTARE_KEY }}
          NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARIZATION_DICTARE_KEY_ID }}
          NOTARY_ISSUER: ${{ secrets.APPLE_NOTARIZATION_ISSUER_ID }}
        run: |
          echo "$NOTARY_KEY" | base64 -d > "$RUNNER_TEMP/AuthKey.p8"
          ditto -c -k build/launcher/Dictare build/launcher/Dictare.zip
          xcrun notarytool submit build/launcher/Dictare.zip \
            --key "$RUNNER_TEMP/AuthKey.p8" \
            --key-id "$NOTARY_KEY_ID" \
            --issuer "$NOTARY_ISSUER" \
            --wait

      # Upload as release asset (only on tag push)
      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ZIP="Dictare-launcher-${VERSION}-universal.zip"
          ditto -c -k build/launcher/Dictare "$ZIP"
          gh release upload "$GITHUB_REF_NAME" "$ZIP" --clobber

      # Upload as artifact (always, for manual builds)
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dictare-launcher-universal
          path: build/launcher/Dictare
