name: "claude: pr review"

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Skip PRs from the maintainer (manual review) and bots
    if: |
      github.event.pull_request.user.login != 'dragfly' &&
      github.event.pull_request.user.type != 'Bot'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Load secrets from Infisical
        env:
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
        run: |
          curl -1sLf 'https://dl.cloudsmith.io/public/infisical/infisical-cli/setup.deb.sh' | sudo -E bash
          sudo apt-get install -y infisical
          infisical export \
            --domain "https://eu.infisical.com" \
            --projectId "7d6c2573-e67b-4243-9911-0a9ddaed58b8" \
            --path "/work/dictare/app/ci" \
            --env prod \
            --format json | \
            jq -c '.[]' | while read -r item; do
              key=$(echo "$item" | jq -r '.key')
              value=$(echo "$item" | jq -r '.value')
              while IFS= read -r line; do
                [[ -n "$line" ]] && echo "::add-mask::$line"
              done <<< "$value"
              EOF_MARKER="EOF_$(head -c 8 /dev/urandom | xxd -p)"
              echo "$key<<$EOF_MARKER" >> "$GITHUB_ENV"
              echo "$value" >> "$GITHUB_ENV"
              echo "$EOF_MARKER" >> "$GITHUB_ENV"
            done

      - name: Run Claude Code for PR Review
        timeout-minutes: 10
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          anthropic_api_key: ${{ env.ANTHROPIC_API_KEY }}
          claude_args: "--model claude-sonnet-4-6"
          prompt: |
            Review this pull request for the dictare project.

            REPO: ${{ github.repository }}
            PR_NUMBER: ${{ github.event.pull_request.number }}
            PR_TITLE: ${{ github.event.pull_request.title }}
            AUTHOR: ${{ github.event.pull_request.user.login }}
            BASE_BRANCH: ${{ github.event.pull_request.base.ref }}

            Dictare is a voice-first control layer for AI coding agents (Claude Code, Cursor, etc.).
            It implements the OpenVIP protocol. Python 3.11, FastAPI, Typer, uv.

            Review instructions:
            1. Read the PR diff using gh CLI
            2. Check: code correctness, test coverage, docs updates, breaking changes
            3. Verify CHANGELOG.md is updated if the change is user-visible
            4. Check for security concerns (no credentials hardcoded, no unsafe operations)
            5. Verify Python 3.11 compatibility and uv/ruff style compliance
            6. Post a concise review comment with: summary of changes, specific feedback (if any),
               and LGTM or requested changes
            7. Add labels: "needs-review" if changes needed, "ready-to-merge" if LGTM
            8. Be constructive and friendly. First-time contributors deserve extra encouragement.
            9. Sign off as "dictare bot"

            Keep the review focused — max 200 words unless there are real issues to flag.
