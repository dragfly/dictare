name: "claude: code"

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Load secrets from Infisical
        env:
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
        run: |
          curl -1sLf 'https://dl.cloudsmith.io/public/infisical/infisical-cli/setup.deb.sh' | sudo -E bash
          sudo apt-get install -y infisical
          infisical export \
            --domain "https://eu.infisical.com" \
            --projectId "7d6c2573-e67b-4243-9911-0a9ddaed58b8" \
            --path "/work/dictare/app/ci" \
            --env prod \
            --format json | \
            jq -c '.[]' | while read -r item; do
              key=$(echo "$item" | jq -r '.key')
              value=$(echo "$item" | jq -r '.value')
              while IFS= read -r line; do
                [[ -n "$line" ]] && echo "::add-mask::$line"
              done <<< "$value"
              EOF_MARKER="EOF_$(head -c 8 /dev/urandom | xxd -p)"
              echo "$key<<$EOF_MARKER" >> "$GITHUB_ENV"
              echo "$value" >> "$GITHUB_ENV"
              echo "$EOF_MARKER" >> "$GITHUB_ENV"
            done

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ env.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: "--model claude-sonnet-4-6"
