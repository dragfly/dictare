name: "0 - release: publish to PyPI"

on:
  workflow_dispatch:

jobs:
  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for Trusted Publisher (OIDC)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  update-tap:
    name: Update Homebrew tap
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from source
        id: version
        run: |
          VERSION=$(grep -E '^__version__' src/dictare/__init__.py | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Wait for PyPI to index the package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for i in $(seq 1 30); do
            if curl -sf "https://pypi.org/pypi/dictare/${VERSION}/json" > /dev/null 2>&1; then
              echo "Package available on PyPI"
              break
            fi
            echo "Waiting for PyPI to index ${VERSION}... (attempt $i/30)"
            sleep 10
          done

      - name: Get tarball URL and SHA256 from PyPI
        id: pypi
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          JSON=$(curl -sf "https://pypi.org/pypi/dictare/${VERSION}/json")
          URL=$(echo "$JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); urls=[u for u in d['urls'] if u['filename'].endswith('.tar.gz')]; print(urls[0]['url'])")
          SHA=$(echo "$JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); urls=[u for u in d['urls'] if u['filename'].endswith('.tar.gz')]; print(urls[0]['digests']['sha256'])")
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Get launcher SHA256 from GitHub Release
        id: launcher
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Download the launcher zip and compute its SHA256
          gh release download "launcher" \
            --pattern "Dictare-launcher-universal.zip" \
            --output /tmp/launcher.zip
          SHA=$(sha256sum /tmp/launcher.zip | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          rm -f /tmp/launcher.zip

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: dragfly/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Write formula
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PYPI_URL="${{ steps.pypi.outputs.url }}"
          PYPI_SHA="${{ steps.pypi.outputs.sha256 }}"
          LAUNCHER_SHA="${{ steps.launcher.outputs.sha256 }}"

          cat > homebrew-tap/Formula/dictare.rb << FORMULA
          class Dictare < Formula
            desc "Voice-first control for AI coding agents"
            homepage "https://github.com/dragfly/dictare"
            url "${PYPI_URL}"
            sha256 "${PYPI_SHA}"
            license "MIT"

            depends_on "portaudio"
            depends_on "uv"
            depends_on :macos

            resource "launcher" do
              url "https://github.com/dragfly/dictare/releases/download/launcher/Dictare-launcher-universal.zip"
              sha256 "${LAUNCHER_SHA}"
            end

            def install
              extras = Hardware::CPU.arm? ? "[mlx]" : ""
              dictare_pkg = "dictare#{extras}==${VERSION}"

              ENV["UV_TOOL_DIR"] = (libexec/"uv-tools").to_s
              ENV["UV_TOOL_BIN_DIR"] = (libexec/"bin").to_s
              ENV["UV_PYTHON_INSTALL_DIR"] = (libexec/"uv-python").to_s

              system "uv", "tool", "install",
                     "--python", "3.11",
                     "--prerelease=allow",
                     dictare_pkg

              bin.install_symlink (libexec/"bin/dictare") => "dictare"

              # Install signed launcher bundle
              resource("launcher").stage do
                (libexec/"bundle").install "Dictare.app"
              end
            end

            def caveats
              <<~EOS
                After install, start the service:

                  dictare service install

                On first launch, macOS will ask for Input Monitoring permission.
                A system dialog will appear — click "Open System Settings" and
                enable the toggle for Dictare. That's it.

                If you installed on Apple Silicon, the MLX backend is included
                for hardware-accelerated on-device speech recognition.
              EOS
            end

            test do
              assert_match "${VERSION}", shell_output("#{bin}/dictare --version")
            end
          end
          FORMULA

      - name: Push to tap
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/dictare.rb
          git commit -m "chore: bump dictare to ${{ steps.version.outputs.version }}"
          git push
