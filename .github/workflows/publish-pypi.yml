name: "0 - release: publish"

on:
  workflow_dispatch:

jobs:
  # ── Gate: extract version, detect pre-release, check duplicates ──
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v6

      - name: Get version and detect pre-release
        id: version
        run: |
          VERSION=$(grep -E '^__version__' src/dictare/__init__.py | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # PEP 440: stable = digits and dots only (e.g. 1.2.3)
          if echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Pre-release version ${VERSION} — will publish to PyPI only (no tag, no GitHub Release, no Homebrew)"
          fi

      - name: Check if already released on PyPI
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if curl -sf "https://pypi.org/pypi/dictare/${VERSION}/json" > /dev/null 2>&1; then
            echo "::error::Version ${VERSION} already exists on PyPI"
            exit 1
          fi

  # ── PyPI: always (stable + pre-release) ──
  publish:
    name: Publish to PyPI
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for Trusted Publisher (OIDC)
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # ── GitHub Release: stable only ──
  github-release:
    name: Create GitHub Release
    needs: [prepare, publish]
    if: needs.prepare.outputs.is_prerelease == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          sed -n "/^## \[${VERSION}\]/,/^## \[/{/^## \[${VERSION}\]/d;/^## \[/d;p}" CHANGELOG.md > /tmp/release-notes.md

      - name: Tag and create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          git tag "v${VERSION}"
          git push origin "v${VERSION}"
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file /tmp/release-notes.md

  # ── Homebrew tap: stable only ──
  update-tap:
    name: Update Homebrew tap
    needs: [prepare, publish]
    if: needs.prepare.outputs.is_prerelease == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Load secrets from Infisical
        env:
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
        run: |
          curl -1sLf 'https://dl.cloudsmith.io/public/infisical/infisical-cli/setup.deb.sh' | sudo -E bash
          sudo apt-get install -y infisical
          infisical export \
            --domain "https://eu.infisical.com" \
            --projectId "7d6c2573-e67b-4243-9911-0a9ddaed58b8" \
            --path "/work/dictare/app/ci" \
            --env prod \
            --format json | \
            jq -c '.[]' | while read -r item; do
              key=$(echo "$item" | jq -r '.key')
              value=$(echo "$item" | jq -r '.value')
              while IFS= read -r line; do
                [[ -n "$line" ]] && echo "::add-mask::$line"
              done <<< "$value"
              EOF_MARKER="EOF_$(head -c 8 /dev/urandom | xxd -p)"
              echo "$key<<$EOF_MARKER" >> "$GITHUB_ENV"
              echo "$value" >> "$GITHUB_ENV"
              echo "$EOF_MARKER" >> "$GITHUB_ENV"
            done

      - name: Wait for PyPI to index the package
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          for i in $(seq 1 30); do
            if curl -sf "https://pypi.org/pypi/dictare/${VERSION}/json" > /dev/null 2>&1; then
              echo "Package available on PyPI"
              break
            fi
            echo "Waiting for PyPI to index ${VERSION}... (attempt $i/30)"
            sleep 10
          done

      - name: Get tarball URL and SHA256 from PyPI
        id: pypi
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          JSON=$(curl -sf "https://pypi.org/pypi/dictare/${VERSION}/json")
          URL=$(echo "$JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); urls=[u for u in d['urls'] if u['filename'].endswith('.tar.gz')]; print(urls[0]['url'])")
          SHA=$(echo "$JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); urls=[u for u in d['urls'] if u['filename'].endswith('.tar.gz')]; print(urls[0]['digests']['sha256'])")
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Get launcher SHA256 from GitHub Release
        id: launcher
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Download the launcher zip and compute its SHA256
          gh release download "launcher" \
            --pattern "Dictare-launcher-universal.zip" \
            --output /tmp/launcher.zip
          SHA=$(sha256sum /tmp/launcher.zip | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          rm -f /tmp/launcher.zip

      - name: Checkout Homebrew tap
        uses: actions/checkout@v6
        with:
          repository: dragfly/homebrew-tap
          token: ${{ env.TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Write formula
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          PYPI_URL="${{ steps.pypi.outputs.url }}"
          PYPI_SHA="${{ steps.pypi.outputs.sha256 }}"
          LAUNCHER_SHA="${{ steps.launcher.outputs.sha256 }}"

          cat > homebrew-tap/Formula/dictare.rb << FORMULA
          class Dictare < Formula
            desc "Voice-first control for AI coding agents"
            homepage "https://github.com/dragfly/dictare"
            url "${PYPI_URL}"
            sha256 "${PYPI_SHA}"
            license "MIT"

            depends_on "portaudio"
            depends_on "uv"
            depends_on :macos

            resource "launcher" do
              url "https://github.com/dragfly/dictare/releases/download/launcher/Dictare-launcher-universal.zip"
              sha256 "${LAUNCHER_SHA}"
            end

            def install
              extras = Hardware::CPU.arm? ? "[mlx]" : ""
              dictare_pkg = "dictare#{extras}==${VERSION}"

              ENV["UV_TOOL_DIR"] = (libexec/"uv-tools").to_s
              ENV["UV_TOOL_BIN_DIR"] = (libexec/"bin").to_s
              ENV["UV_PYTHON_INSTALL_DIR"] = (libexec/"uv-python").to_s

              system "uv", "tool", "install",
                     "--python", "3.11",
                     "--prerelease=allow",
                     dictare_pkg

              bin.install_symlink (libexec/"bin/dictare") => "dictare"

              # Store signed launcher bundle in Cellar
              resource("launcher").stage do
                target = libexec/"bundle/Dictare.app"
                target.mkpath
                system "cp", "-R", *Dir.glob("*"), target.to_s
              end
            end

            def post_install
              # Copy launcher to ~/Applications ONLY on first install.
              # Signed .app bundles can't be overwritten (macOS SIP).
              real_home = ENV["HOME"] || Pathname.new("~").expand_path.to_s
              app_dest = Pathname.new(real_home)/"Applications/Dictare.app"
              launcher_src = libexec/"bundle/Dictare.app"
              if launcher_src.exist? && !app_dest.exist?
                system "ditto", launcher_src.to_s, app_dest.to_s
              end
            end

            def caveats
              <<~EOS
                First install:

                  dictare service install

                After upgrade:

                  dictare service restart

                On first launch, macOS will ask for Input Monitoring permission.
                Grant it in System Settings > Privacy & Security > Input Monitoring.

                Apple Silicon: MLX backend included for hardware-accelerated STT.
              EOS
            end

            test do
              assert_match "${VERSION}", shell_output("#{bin}/dictare --version")
            end
          end
          FORMULA

      - name: Push to tap
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/dictare.rb
          git commit -m "chore: bump dictare to ${{ needs.prepare.outputs.version }}"
          git push
