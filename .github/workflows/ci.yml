name: CI

on:
  push:
    branches: ["*"]  # Run on all branches
  pull_request:
    branches: [main]

jobs:
  test-linux:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4

      - name: Checkout OpenVIP SDK
        run: |
          SDK_DIR="../../nottoplay/openvip-sdks"
          if [ -d "$SDK_DIR/.git" ]; then
            git -C "$SDK_DIR" pull --ff-only
          else
            mkdir -p "$(dirname "$SDK_DIR")"
            git clone git@github.com:openvip-dev/sdks.git "$SDK_DIR"
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python and install deps
        run: |
          uv venv --python 3.11 .venv
          . .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: Run linter
        run: |
          . .venv/bin/activate
          ruff check .

      - name: Run tests
        run: |
          . .venv/bin/activate
          pytest tests/ -v

  test-macos:
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v4

      - name: Checkout OpenVIP SDK
        run: |
          SDK_DIR="../../nottoplay/openvip-sdks"
          if [ -d "$SDK_DIR/.git" ]; then
            git -C "$SDK_DIR" pull --ff-only
          else
            mkdir -p "$(dirname "$SDK_DIR")"
            git clone git@github.com:openvip-dev/sdks.git "$SDK_DIR"
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python and install deps
        run: |
          uv venv --python 3.11 .venv
          . .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: Run linter
        run: |
          . .venv/bin/activate
          ruff check .

      - name: Run tests
        run: |
          . .venv/bin/activate
          pytest tests/ -v

  typecheck:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4

      - name: Checkout OpenVIP SDK
        run: |
          SDK_DIR="../../nottoplay/openvip-sdks"
          if [ -d "$SDK_DIR/.git" ]; then
            git -C "$SDK_DIR" pull --ff-only
          else
            mkdir -p "$(dirname "$SDK_DIR")"
            git clone git@github.com:openvip-dev/sdks.git "$SDK_DIR"
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python and install deps
        run: |
          uv venv --python 3.11 .venv
          . .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: Run mypy
        run: |
          . .venv/bin/activate
          mypy src/
