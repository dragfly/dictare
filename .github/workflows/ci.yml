name: "auto: test + lint"

on:
  push:
    branches: ["*"]  # Run on all branches
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install system deps
        run: sudo apt-get install -y libportaudio2 xvfb

      - name: Install deps
        run: pip install -e ".[dev]"

      - name: Run linter
        run: ruff check src/ tests/

      - name: Run security scan
        run: bandit -r src/ -lll -q

      - name: Run tests with coverage
        run: xvfb-run pytest tests/ -v -m '' --cov=dictare --cov-report=term-missing --cov-fail-under=45

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install deps
        run: pip install -e ".[dev]"

      - name: Run mypy
        run: mypy src/
