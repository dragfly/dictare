name: CI

on:
  push:
    branches: ["*"]  # Run on all branches
  pull_request:
    branches: [main]

jobs:
  test-linux:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: openvip-dev/sdks
          token: ${{ secrets.OPENVIP_SDK_TOKEN }}
          path: openvip-sdks

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install system deps (Xvfb for tray tests)
        run: |
          which xvfb-run || sudo apt-get install -y xvfb

      - name: Set up Python and install deps
        run: |
          VENV=$HOME/.venvs/dictare-ci
          test -d $VENV || uv venv --python 3.11 $VENV
          echo "VIRTUAL_ENV=$VENV" >> $GITHUB_ENV
          echo "$VENV/bin" >> $GITHUB_PATH
          export VIRTUAL_ENV=$VENV PATH="$VENV/bin:$PATH"
          uv pip install -e ./openvip-sdks/python
          uv pip install --no-sources -e ".[dev]"

      - name: Run linter
        run: ruff check src/ tests/

      - name: Run tests with coverage
        run: xvfb-run pytest tests/ -v -m '' --cov=dictare --cov-report=term-missing

  test-macos:
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: openvip-dev/sdks
          token: ${{ secrets.OPENVIP_SDK_TOKEN }}
          path: openvip-sdks

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python and install deps
        run: |
          VENV=$HOME/.venvs/dictare-ci
          test -d $VENV || uv venv --python 3.11 $VENV
          echo "VIRTUAL_ENV=$VENV" >> $GITHUB_ENV
          echo "$VENV/bin" >> $GITHUB_PATH
          export VIRTUAL_ENV=$VENV PATH="$VENV/bin:$PATH"
          uv pip install -e ./openvip-sdks/python
          uv pip install --no-sources -e ".[dev]"

      - name: Run linter
        run: ruff check src/ tests/

      - name: Run tests
        run: pytest tests/ -v -m ''

  typecheck:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: openvip-dev/sdks
          token: ${{ secrets.OPENVIP_SDK_TOKEN }}
          path: openvip-sdks

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python and install deps
        run: |
          VENV=$HOME/.venvs/dictare-ci
          test -d $VENV || uv venv --python 3.11 $VENV
          echo "VIRTUAL_ENV=$VENV" >> $GITHUB_ENV
          echo "$VENV/bin" >> $GITHUB_PATH
          export VIRTUAL_ENV=$VENV PATH="$VENV/bin:$PATH"
          uv pip install -e ./openvip-sdks/python
          uv pip install --no-sources -e ".[dev]"

      - name: Run mypy
        run: mypy src/
