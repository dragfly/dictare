name: CI

on:
  push:
    branches: ["*"]  # Run on all branches
  pull_request:
    branches: [main]

jobs:
  test-linux:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        run: |
          python3.11 -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run linter
        run: |
          . .venv/bin/activate
          ruff check .

      - name: Run tests
        run: |
          . .venv/bin/activate
          pytest tests/ -v

  test-macos:
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --python 3.11 --extra dev --prerelease=allow

      - name: Run linter
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest tests/ -v

  typecheck:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        run: |
          python3.11 -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run mypy
        run: |
          . .venv/bin/activate
          mypy src/
