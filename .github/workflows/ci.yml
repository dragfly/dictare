name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y portaudio19-dev

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --python 3.11 --extra dev --prerelease=allow

      - name: Run linter
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest tests/ -v

  test-macos:
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --python 3.11 --extra dev --prerelease=allow

      - name: Run linter
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest tests/ -v

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --python 3.11 --extra dev --prerelease=allow

      - name: Run mypy
        run: uv run mypy src/
