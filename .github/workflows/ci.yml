name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ['3.11']

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --python ${{ matrix.python }} --extra dev

      - name: Run linter
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest tests/ -v

  typecheck:
    runs-on: ubuntu-latest
    # TODO: Fix mypy errors and remove continue-on-error
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --python 3.11 --extra dev

      - name: Run mypy
        run: uv run mypy src/
