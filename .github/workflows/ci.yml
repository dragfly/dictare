name: CI

on:
  push:
    branches: ["*"]  # Run on all branches
  pull_request:
    branches: [main]

jobs:
  test-linux:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          rm -rf .venv
          uv sync --python 3.11 --extra dev --prerelease=allow --no-cache

      - name: Run linter
        run: uv tool run ruff check .

      - name: Run tests
        run: uv run pytest tests/ -v

  test-macos:
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --python 3.11 --extra dev --prerelease=allow

      - name: Run linter
        run: uv tool run ruff check .

      - name: Run tests
        run: uv run pytest tests/ -v

  typecheck:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          rm -rf .venv
          uv sync --python 3.11 --extra dev --prerelease=allow --no-cache

      - name: Run mypy
        run: uv tool run mypy src/
