name: CI

on:
  push:
    branches: ["*"]  # Run on all branches
  pull_request:
    branches: [main]

jobs:
  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install system deps (Xvfb for tray tests)
        run: |
          which xvfb-run || sudo apt-get install -y xvfb

      - name: Set up Python and install deps
        run: |
          uv venv --python 3.11 .venv
          echo "VIRTUAL_ENV=$PWD/.venv" >> $GITHUB_ENV
          echo "$PWD/.venv/bin" >> $GITHUB_PATH
          pip install -e ".[dev]"

      - name: Run linter
        run: ruff check src/ tests/

      - name: Run tests with coverage
        run: xvfb-run pytest tests/ -v -m '' --cov=dictare --cov-report=term-missing

  test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python and install deps
        run: |
          uv venv --python 3.11 .venv
          echo "VIRTUAL_ENV=$PWD/.venv" >> $GITHUB_ENV
          echo "$PWD/.venv/bin" >> $GITHUB_PATH
          pip install -e ".[dev]"

      - name: Run linter
        run: ruff check src/ tests/

      - name: Run tests
        run: pytest tests/ -v -m ''

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python and install deps
        run: |
          uv venv --python 3.11 .venv
          echo "VIRTUAL_ENV=$PWD/.venv" >> $GITHUB_ENV
          echo "$PWD/.venv/bin" >> $GITHUB_PATH
          pip install -e ".[dev]"

      - name: Run mypy
        run: mypy src/
