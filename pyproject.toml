[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "claude-mic"
version = "0.4.4"
description = "Voice-to-text for Claude Code CLI"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11,<3.12"
authors = [
    { name = "Your Name", email = "you@example.com" }
]
keywords = ["voice", "speech-to-text", "claude", "cli", "whisper"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: POSIX :: Linux",
    "Operating System :: MacOS",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Multimedia :: Sound/Audio :: Speech",
]

dependencies = [
    "faster-whisper>=1.0.0",
    "sounddevice>=0.5.0",
    "numpy>=1.24.0",
    "typer>=0.12.0",
    "rich>=13.0.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
linux = [
    "evdev>=1.7.0",
]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=4.0.0",
    "ruff>=0.4.0",
    "mypy>=1.0.0",
]
macos = [
    "pynput>=1.7.0",
]
cloud = [
    "openai>=1.0.0",
]
gpu = [
    "nvidia-cudnn-cu12>=9.0.0",
]

[project.scripts]
claude-mic = "claude_mic.cli:main"

[project.urls]
Homepage = "https://github.com/dragfly/claude-mic"
Repository = "https://github.com/dragfly/claude-mic"
Issues = "https://github.com/dragfly/claude-mic/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/claude_mic"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]

[tool.mypy]
python_version = "3.10"
strict = true

[tool.pytest.ini_options]
testpaths = ["tests"]
